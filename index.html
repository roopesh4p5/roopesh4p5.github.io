<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard - roopesh4p5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .holo-border {
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans overflow-x-hidden">
    <div class="max-w-6xl mx-auto space-y-8 relative z-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Profile & Info -->
            <div class="lg:col-span-1 space-y-8">
                <section id="profile-section" class="bg-slate-800 holo-border rounded-3xl p-8 shadow-2xl space-y-6 text-center">
                    <div id="avatar-container" class="w-24 h-24 mx-auto rounded-full bg-slate-700 border-2 border-blue-500/30 overflow-hidden">
                        <!-- Avatar -->
                    </div>
                    <div class="space-y-2">
                        <h1 id="user-name" class="text-2xl font-bold tracking-tight">Loading...</h1>
                        <p id="user-bio" class="text-slate-400 text-sm">Fetching profile...</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <div class="p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                            <div id="repo-count" class="text-xl font-bold text-blue-400">--</div>
                            <div class="text-[10px] uppercase text-slate-500">Repositories</div>
                        </div>
                        <div class="p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                            <div id="follower-count" class="text-xl font-bold text-emerald-400">--</div>
                            <div class="text-[10px] uppercase text-slate-500">Followers</div>
                        </div>
                    </div>

                    <!-- Moved Clock Here -->
                    <div class="p-4 bg-slate-900/80 rounded-2xl border border-blue-500/20">
                        <div id="digital-clock" class="text-3xl font-mono font-bold text-blue-400 tabular-nums">
                            00:00:00
                        </div>
                        <div class="text-[10px] uppercase tracking-widest text-slate-500 mt-1">Local System Time</div>
                    </div>
                </section>
            </div>

            <!-- Right: Repos Grid -->
            <div class="lg:col-span-2 space-y-6">
                <h2 class="text-xl font-bold px-2 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-blue-500 rounded-full"></span>
                    Repositories
                </h2>
                <div id="repos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Skeleton Cards -->
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                </div>
            </div>
        </div>

        <footer class="text-center pt-8 text-slate-600 text-[10px] uppercase tracking-[0.2em]">
            AI Integrated Environment • <span id="sync-time">Syncing...</span>
        </footer>
    </div>

    <script>
        const USERNAME = 'roopesh4p5';

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchGitHubData() {
            try {
                const userResponse = await fetch(`https://api.github.com/users/${USERNAME}`);
                const userData = await userResponse.json();
                
                document.getElementById('avatar-container').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar" class="w-full h-full object-cover">`;
                document.getElementById('user-name').innerText = userData.name || userData.login;
                document.getElementById('user-bio').innerText = userData.bio || 'Developer';
                document.getElementById('repo-count').innerText = userData.public_repos;
                document.getElementById('follower-count').innerText = userData.followers;

                const reposResponse = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=6`);
                const reposData = await reposResponse.json();
                
                const reposGrid = document.getElementById('repos-grid');
                reposGrid.innerHTML = '';

                reposData.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800/80 backdrop-blur holo-border rounded-2xl p-6 hover:bg-slate-700/50 transition-all group';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold group-hover:text-blue-400 transition-colors truncate pr-4">${repo.name}</h3>
                        </div>
                        <p class="text-slate-400 text-xs mb-6 line-clamp-2 h-8">${repo.description || 'No description'}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] text-slate-500 font-mono">${repo.language || 'Code'}</span>
                            <div class="flex gap-3">
                                <a href="${repo.html_url}" target="_blank" class="text-[10px] font-bold text-blue-400 uppercase">Source</a>
                                ${repo.has_pages ? `<a href="https://${USERNAME}.github.io/${repo.name}/" target="_blank" class="text-[10px] font-bold text-emerald-400 uppercase">Live</a>` : ''}
                            </div>
                        </div>
                    `;
                    reposGrid.appendChild(card);
                });

                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();
            } catch (error) { console.error(error); }
        }

        fetchGitHubData();
    </script>
</body>
</html>
