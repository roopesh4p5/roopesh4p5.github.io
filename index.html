<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard - roopesh4p5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .gradient-text {
            background: linear-gradient(to r, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header / Profile Section -->
        <header id="profile-section" class="bg-slate-800 border border-slate-700 rounded-3xl p-8 shadow-2xl flex flex-col md:flex-row items-center gap-8 animate-pulse">
            <div id="avatar-container" class="w-32 h-32 rounded-full bg-slate-700 border-4 border-slate-600 overflow-hidden">
                <!-- Avatar injected here -->
            </div>
            <div class="flex-1 text-center md:text-left space-y-2">
                <h1 id="user-name" class="text-4xl font-bold tracking-tight">Loading Profile...</h1>
                <p id="user-bio" class="text-slate-400 max-w-xl">Fetching data from GitHub...</p>
                <div class="flex flex-wrap justify-center md:justify-start gap-4 pt-2">
                    <span id="repo-count" class="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-sm font-semibold">Repos: --</span>
                    <span id="follower-count" class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm font-semibold">Followers: --</span>
                </div>
            </div>
        </header>

        <!-- Projects Grid -->
        <section class="space-y-6">
            <h2 class="text-2xl font-bold px-2 flex items-center gap-2">
                <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
                My Deployed Projects & Repos
            </h2>
            <div id="repos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Repo cards injected here -->
                <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
            </div>
        </section>

        <footer class="text-center pt-8 text-slate-500 text-sm italic">
            Dashboard dynamically generated by AI • Last Sync: <span id="sync-time">Just now</span>
        </footer>
    </div>

    <script>
        const USERNAME = 'roopesh4p5';

        async function fetchGitHubData() {
            try {
                // Fetch User Details
                const userResponse = await fetch(`https://api.github.com/users/${USERNAME}`);
                const userData = await userResponse.json();
                
                // Update Profile
                document.getElementById('profile-section').classList.remove('animate-pulse');
                document.getElementById('avatar-container').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar" class="w-full h-full object-cover">`;
                document.getElementById('user-name').innerText = userData.name || userData.login;
                document.getElementById('user-bio').innerText = userData.bio || 'Professional Developer & AI Enthusiast';
                document.getElementById('repo-count').innerText = `Repos: ${userData.public_repos}`;
                document.getElementById('follower-count').innerText = `Followers: ${userData.followers}`;

                // Fetch Repos
                const reposResponse = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=6`);
                const reposData = await reposResponse.json();
                
                const reposGrid = document.getElementById('repos-grid');
                reposGrid.innerHTML = ''; // Clear skeleton

                reposData.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800 border border-slate-700 rounded-2xl p-6 hover:border-blue-500/50 transition-all group';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-lg group-hover:text-blue-400 transition-colors">${repo.name}</h3>
                            <span class="text-xs px-2 py-1 bg-slate-700 rounded text-slate-400 font-mono">${repo.language || 'Code'}</span>
                        </div>
                        <p class="text-slate-400 text-sm mb-4 line-clamp-2">${repo.description || 'No description provided.'}</p>
                        <div class="flex items-center gap-4 mt-auto">
                            <a href="${repo.html_url}" target="_blank" class="text-xs font-semibold text-blue-400 hover:text-blue-300">GitHub ↗</a>
                            ${repo.has_pages ? `<a href="https://${USERNAME}.github.io/${repo.name}/" target="_blank" class="text-xs font-semibold text-emerald-400 hover:text-emerald-300">Live Demo ⚡</a>` : ''}
                        </div>
                    `;
                    reposGrid.appendChild(card);
                });

                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('user-name').innerText = 'Error Loading Profile';
            }
        }

        fetchGitHubData();
    </script>
</body>
</html>
