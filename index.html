<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard - roopesh4p5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .gradient-text {
            background: linear-gradient(to r, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #earth-canvas {
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
        }
        .holo-border {
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8 font-sans overflow-x-hidden">
    <div class="max-w-6xl mx-auto space-y-8 relative z-10">
        
        <!-- Top Bar: Clock & Status -->
        <div class="flex justify-between items-center bg-slate-800/50 backdrop-blur-md holo-border rounded-2xl px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                <span class="text-xs font-mono uppercase tracking-widest text-slate-400">System Active</span>
            </div>
            <div id="digital-clock" class="text-2xl font-mono font-bold text-blue-400 tabular-nums">
                00:00:00
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Profile & Earth -->
            <div class="lg:col-span-1 space-y-8">
                <section id="profile-section" class="bg-slate-800 holo-border rounded-3xl p-8 shadow-2xl space-y-6">
                    <div id="avatar-container" class="w-24 h-24 mx-auto rounded-full bg-slate-700 border-2 border-blue-500/30 overflow-hidden shadow-lg shadow-blue-500/20">
                        <!-- Avatar injected here -->
                    </div>
                    <div class="text-center space-y-2">
                        <h1 id="user-name" class="text-2xl font-bold tracking-tight">Loading...</h1>
                        <p id="user-bio" class="text-slate-400 text-sm italic">Fetching GitHub profile...</p>
                    </div>
                    
                    <!-- 3D Earth Container -->
                    <div class="relative h-64 w-full flex items-center justify-center overflow-hidden rounded-2xl bg-slate-900/50">
                        <div id="earth-canvas" class="cursor-grab active:cursor-grabbing"></div>
                        <div class="absolute bottom-2 text-[10px] font-mono text-blue-500/50 uppercase tracking-tighter">Holographic Earth Engine v1.0</div>
                    </div>

                    <div class="flex justify-between gap-2 pt-2">
                        <div class="flex-1 text-center p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                            <div id="repo-count" class="text-xl font-bold text-blue-400">--</div>
                            <div class="text-[10px] uppercase text-slate-500">Repositories</div>
                        </div>
                        <div class="flex-1 text-center p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                            <div id="follower-count" class="text-xl font-bold text-emerald-400">--</div>
                            <div class="text-[10px] uppercase text-slate-500">Followers</div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right: Repos Grid -->
            <div class="lg:col-span-2 space-y-6">
                <h2 class="text-xl font-bold px-2 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-blue-500 rounded-full"></span>
                    Operational Repositories
                </h2>
                <div id="repos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Skeleton Cards -->
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 h-32 animate-pulse"></div>
                </div>
            </div>
        </div>

        <footer class="text-center pt-8 text-slate-600 text-[10px] uppercase tracking-[0.2em]">
            AI Integrated Environment • Secure Node • <span id="sync-time">Syncing...</span>
        </footer>
    </div>

    <script>
        const USERNAME = 'roopesh4p5';

        // --- Digital Clock ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('digital-clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- GitHub API ---
        async function fetchGitHubData() {
            try {
                const userResponse = await fetch(`https://api.github.com/users/${USERNAME}`);
                const userData = await userResponse.json();
                
                document.getElementById('avatar-container').innerHTML = `<img src="${userData.avatar_url}" alt="Avatar" class="w-full h-full object-cover">`;
                document.getElementById('user-name').innerText = userData.name || userData.login;
                document.getElementById('user-bio').innerText = userData.bio || 'AI Managed Profile';
                document.getElementById('repo-count').innerText = userData.public_repos;
                document.getElementById('follower-count').innerText = userData.followers;

                const reposResponse = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=6`);
                const reposData = await reposResponse.json();
                
                const reposGrid = document.getElementById('repos-grid');
                reposGrid.innerHTML = '';

                reposData.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800/80 backdrop-blur holo-border rounded-2xl p-6 hover:bg-slate-700/50 transition-all group relative overflow-hidden';
                    card.innerHTML = `
                        <div class="absolute top-0 right-0 p-2 opacity-10">
                             <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        </div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold group-hover:text-blue-400 transition-colors text-slate-100 truncate pr-8">${repo.name}</h3>
                        </div>
                        <p class="text-slate-400 text-xs mb-6 line-clamp-2 h-8 font-mono">${repo.description || 'System module initialized...'}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] text-slate-500 font-mono">${repo.language || 'DATA'}</span>
                            <div class="flex gap-3">
                                <a href="${repo.html_url}" target="_blank" class="text-[10px] font-bold text-blue-400 hover:glow uppercase tracking-wider">Source</a>
                                ${repo.has_pages ? `<a href="https://${USERNAME}.github.io/${repo.name}/" target="_blank" class="text-[10px] font-bold text-emerald-400 hover:glow uppercase tracking-wider">Live</a>` : ''}
                            </div>
                        </div>
                    `;
                    reposGrid.appendChild(card);
                });

                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();

            } catch (error) {
                console.error('Error:', error);
            }
        }

        // --- Three.js Holographic Earth ---
        function initEarth() {
            const container = document.getElementById('earth-canvas');
            const width = 250, height = 250;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 2.5;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            // Create Earth Geometry
            const geometry = new THREE.IcosahedronGeometry(1, 15);
            
            // Wireframe Material for "Holographic" look
            const material = new THREE.MeshBasicMaterial({
                color: 0x3b82f6,
                wireframe: true,
                transparent: true,
                opacity: 0.4
            });

            const earth = new THREE.Mesh(geometry, material);
            scene.add(earth);

            // Outer Glow Sphere
            const glowGeom = new THREE.SphereGeometry(1.05, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x60a5fa,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            scene.add(glow);

            // Animation
            function animate() {
                requestAnimationFrame(animate);
                earth.rotation.y += 0.005;
                earth.rotation.x += 0.002;
                renderer.render(scene, camera);
            }
            animate();
        }

        fetchGitHubData();
        initEarth();
    </script>
</body>
</html>
